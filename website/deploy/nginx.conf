# Nginx server block for the GEO content site (alternative to Caddyfile).
# 1. Place in /etc/nginx/sites-available/heicbatchconverter and symlink to sites-enabled
# 2. Obtain certificates: sudo certbot --nginx -d heicbatchconverter.alantao.com
# 3. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name heicbatchconverter.alantao.com;

    root /var/www/heicbatchconverter;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml text/plain application/xml;

    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
