<svg width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg" role="img">
<title>HEIC Photo Logo</title>
<desc></desc>

<defs>
  <clipPath id="flowerClip">
    <circle cx="432" cy="312" r="104"/>
    <circle cx="406" cy="386" r="104"/>
    <circle cx="340" cy="412" r="104"/>
    <circle cx="274" cy="386" r="104"/>
    <circle cx="248" cy="312" r="104"/>
    <circle cx="274" cy="238" r="104"/>
    <circle cx="340" cy="212" r="104"/>
    <circle cx="406" cy="238" r="104"/>
  </clipPath>
</defs>

<!-- White background, no border, no rounded corners -->
<rect x="0" y="0" width="680" height="680" fill="white"/>

<!-- 8 petal circles -->
<circle cx="432" cy="312" r="104" fill="#E84040" stroke="#111" stroke-width="9"/>
<circle cx="406" cy="386" r="104" fill="#F0921A" stroke="#111" stroke-width="9"/>
<circle cx="340" cy="412" r="104" fill="#F5C800" stroke="#111" stroke-width="9"/>
<circle cx="274" cy="386" r="104" fill="#58C93E" stroke="#111" stroke-width="9"/>
<circle cx="248" cy="312" r="104" fill="#1FBBAA" stroke="#111" stroke-width="9"/>
<circle cx="274" cy="238" r="104" fill="#2A80E8" stroke="#111" stroke-width="9"/>
<circle cx="340" cy="212" r="104" fill="#7A50D8" stroke="#111" stroke-width="9"/>
<circle cx="406" cy="238" r="104" fill="#D845A2" stroke="#111" stroke-width="9"/>

<!-- Diagonal star lines -->
<g clip-path="url(#flowerClip)" stroke="#111" stroke-width="9" fill="none" opacity="0.6">
  <line x1="248" y1="312" x2="432" y2="312"/>
  <line x1="340" y1="212" x2="340" y2="412"/>
  <line x1="274" y1="238" x2="406" y2="386"/>
  <line x1="406" y1="238" x2="274" y2="386"/>
</g>

<!-- Camera lens rings -->
<circle cx="340" cy="312" r="62" fill="#111"/>
<circle cx="340" cy="312" r="54" fill="#3c3c3c"/>
<circle cx="340" cy="312" r="46" fill="#151515"/>
<circle cx="340" cy="312" r="36" fill="#505050"/>
<circle cx="340" cy="312" r="25" fill="#111"/>
<circle cx="328" cy="300" r="10" fill="white" opacity="0.35"/>
<circle cx="348" cy="322" r="5" fill="white" opacity="0.15"/>

<!-- HEIC yellow banner -->
<rect x="148" y="528" width="384" height="76" rx="14" fill="#FFD700"/>
<text x="340" y="585" text-anchor="middle"
  font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
  font-size="48" font-weight="900" fill="#111" letter-spacing="3">HEIC</text>

</svg>
