name: Deploy website

# Builds the Astro GEO content site (website/) and rsyncs it to the
# self-hosted server over SSH. This is the CI equivalent of
# website/scripts/deploy.sh.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   SSH_HOST         server hostname or IP
#   SSH_USER         deploy user
#   SSH_PRIVATE_KEY  private key whose public half is in the server's authorized_keys
#   SSH_KNOWN_HOSTS  output of: ssh-keyscan -H <host>   (pins the server host key)
# Optional:
#   SSH_PORT         SSH port (defaults to 22)
#   DEPLOY_PATH      target dir (defaults to /var/www/heicbatchconvert)

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

concurrency:
  group: deploy-website
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build
        working-directory: website
        run: npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          TARGET="${DEPLOY_PATH:-/var/www/heicbatchconvert}"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p $PORT" \
            website/dist/ "$SSH_USER@$SSH_HOST:$TARGET/"
          echo "Deployed to https://heicbatchconvert.alantao.com"
